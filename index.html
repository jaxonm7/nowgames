<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jax Games | Next-Gen</title>
    <style>
        /* -------------------------------------------------------------
           PREMIUM DESIGN SYSTEM & 3D MATRIX CONSTANTS
        ------------------------------------------------------------- */
        :root {
            --bg-main: #A80800; /* Updated to deep crimson */
            --bg-card: #1f0302; /* Darker red-tinted card background */
            --neon-cyan: #FF0800; /* Updated to vibrant neon red */
            --light-cyan: #ffcccc; /* Soft light red for highlight states */
            --dark-cyan: #540400; /* Dark shadow red for structural borders */
            
            --ultra-timing: cubic-bezier(0.25, 1, 0.3, 1);
            --bounce-timing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffebee;
            overflow-x: hidden;
            min-height: 100vh;
            perspective: 1200px; /* Establishes global 3D room spaces */
        }

        /* Global Viewport Structural Wrapper */
        .page-wrapper {
            transition: transform 0.8s var(--ultra-timing), filter 0.8s var(--ultra-timing);
            will-change: transform, filter;
            width: 100%;
            min-height: 100vh;
            transform-style: preserve-3d;
        }

        /* Warp-back cinematic background state when card activates */
        body.is-cinematic-loading .page-wrapper {
            filter: blur(15px) brightness(0.3);
            transform: scale(0.92) translateZ(-100px);
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           HEADER & NAVIGATION ELEMENTS
        ------------------------------------------------------------- */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            user-select: none;
            transition: transform 0.3s ease;
        }
        .logo:hover {
            transform: skewX(-5deg) scale(1.03);
        }

        .jax { color: #ffffff; }
        .games-cyan { 
            color: var(--neon-cyan); 
            text-shadow: 0 0 20px rgba(255, 8, 0, 0.7);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px 100px 40px;
            text-align: center;
        }

        h1.section-title {
            font-size: 3.2rem;
            margin-bottom: 40px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        h1.section-title::after {
            content: '';
            position: absolute;
            left: 10%;
            bottom: -15px;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* -------------------------------------------------------------
           SEARCH BAR INTERFACE
        ------------------------------------------------------------- */
        .search-container {
            margin-bottom: 60px;
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 500px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            border: 3px solid var(--dark-cyan);
            background-color: var(--bg-card);
            color: #ffffff;
            outline: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.4s var(--ultra-timing);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-bar:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(255, 8, 0, 0.5), 0 10px 20px rgba(0,0,0,0.4);
            transform: scale(1.02);
        }

        /* -------------------------------------------------------------
           3D GAME GRID ARCHITECTURE
        ------------------------------------------------------------- */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 45px;
            transform-style: preserve-3d; /* Passes 3D space parameters down to elements */
        }

        .game-link {
            text-decoration: none;
            display: block;
            outline: none;
            perspective: 1000px; /* Individual card wrapper depth */
        }

        /* Dramatic 3D Style Framework Container */
        .game-button {
            position: relative;
            width: 210px;
            height: 210px;
            background-color: var(--bg-card);
            border: 3px solid var(--dark-cyan);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 0 15px rgba(255, 8, 0, 0.05);
            
            /* Hardware properties setup */
            transform-style: preserve-3d;
            transform: translateZ(0);
            transition: transform 0.5s var(--ultra-timing), border-color 0.5s var(--ultra-timing), box-shadow 0.5s var(--ultra-timing);
            will-change: transform, box-shadow, border-color;
        }

        /* High-Definition Internal Visual Layer */
        .game-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translateZ(0) scale(1.01);
            transition: transform 0.6s var(--ultra-timing), filter 0.4s ease;
        }

        /* Glare sweep container animation component */
        .game-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-30deg) translateZ(10px);
            transition: none;
            z-index: 3;
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           HIGH-DRAMA HOVER ARCHITECTURE
        ------------------------------------------------------------- */
        .game-link:hover .game-button {
            border-color: var(--neon-cyan);
            /* Massive multi-tier 3D transformation and lift */
            transform: translateY(-15px) rotateX(12deg) rotateY(-8deg) translateZ(30px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(255, 8, 0, 0.4),
                        inset 0 0 20px rgba(255, 8, 0, 0.2);
        }

        /* Active Glare sweep command on user interaction */
        .game-link:hover .game-button::before {
            left: 150%;
            transition: left 0.7s var(--ultra-timing);
        }

        .game-link:hover .game-button img {
            transform: translateZ(15px) scale(1.12); /* Pop photo further outwards in 3D frame space */
        }

        /* Hidden Class for Search Filtering */
        .game-link.is-hidden {
            display: none;
        }

        /* -------------------------------------------------------------
           CINEMATIC HERO IMMERSIVE VIEWPAL INTERFACE
        ------------------------------------------------------------- */
        .cinematic-portal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Flying active clone viewport component matrix */
        .focus-clone {
            position: absolute;
            width: 210px;
            height: 210px;
            background-color: var(--bg-card);
            border: 4px solid var(--light-cyan);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 60px var(--light-cyan), 0 0 120px rgba(255, 8, 0, 0.4);
            transition: top 0.7s var(--ultra-timing), left 0.7s var(--ultra-timing), transform 0.7s var(--ultra-timing), box-shadow 0.7s var(--ultra-timing);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(50px);
        }

        /* Zoom Destination modifiers executed perfectly inside global viewports */
        .focus-clone.is-zoomed {
            transform: scale(1.8) rotateX(0deg) rotateY(0deg) rotateZ(360deg); /* Full cinematic 360 rotation zoom spin */
            box-shadow: 0 0 100px var(--light-cyan), 
                        0 0 200px rgba(255, 8, 0, 0.6), 
                        0 30px 80px rgba(0,0,0,0.8);
        }

        .focus-clone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(2px) brightness(0.6);
        }

        /* High-fidelity internal dashboard overlay elements */
        .portal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(21, 8, 8, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Supercharged Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 8, 0, 0.1);
            border-top: 4px solid var(--neon-cyan);
            border-bottom: 4px solid var(--neon-cyan);
            border-radius: 50%;
            animation: hyperSpin 0.6s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text {
            color: var(--neon-cyan);
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulseText 1s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(255, 8, 0, 0.6);
        }

        /* -------------------------------------------------------------
           KEYFRAMES MATRIX ENGINE
        ------------------------------------------------------------- */
        @keyframes hyperSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; transform: scale(0.93); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>

    <div class="cinematic-portal" id="cinematicPortal"></div>

    <script>
        // 1. REAL-TIME SEARCH FILTER SYSTEM
        const searchInput = document.getElementById('gameSearch');
        const gameLinks = document.querySelectorAll('.game-link');

        searchInput.addEventListener('input', function() {
            const filterText = this.value.toLowerCase().trim();

            gameLinks.forEach(link => {
                const gameTitle = link.getAttribute('data-title').toLowerCase();
                
                if (gameTitle.includes(filterText)) {
                    link.classList.remove('is-hidden');
                } else {
                    link.classList.add('is-hidden');
                }
            });
        });

        // 2. DYNAMIC MOUSE TILT EFFECTS (Makes layout respond exactly to mouse position)
        gameLinks.forEach(link => {
            const button = link.querySelector('.game-button');

            link.addEventListener('mousemove', (e) => {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left - (rect.width / 2);
                const y = e.clientY - rect.top - (rect.height / 2);
                
                // Maps coordinate data to precise tilt degrees
                const tiltX = (y / (rect.height / 2)) * -18;
                const tiltY = (x / (rect.width / 2)) * 18;

                button.style.transform = `translateY(-15px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(35px)`;
            });

            // Resets card positioning beautifully when cursor leaves boundaries
            link.addEventListener('mouseleave', () => {
                button.style.transform = '';
            });

            // 3. KINETIC OUTRO PORTAL ROUTINE
            link.addEventListener('click', function(e) {
                e.preventDefault();

                const img = button.querySelector('img');
                const targetUrl = this.href;
                const portal = document.getElementById('cinematicPortal');
                const rect = button.getBoundingClientRect();

                // Build isolated standalone breakout instance clone
                const clone = document.createElement('div');
                clone.className = 'focus-clone';
                clone.style.top = `${rect.top}px`;
                clone.style.left = `${rect.left}px`;

                clone.innerHTML = `
                    <div class="portal-overlay">
                        <div class="spinner"></div>
                        <div class="loading-text">Loading</div>
                    </div>
                    <img src="${img.getAttribute('src')}" alt="Focus Link Assets">
                `;

                portal.appendChild(clone);
                button.style.opacity = '0'; // Instantly hide base layer component

                // Fire warp system properties inside global engine
                document.body.classList.add('is-cinematic-loading');

                requestAnimationFrame(() => {
                    const centerX = window.innerWidth / 2 - rect.width / 2;
                    const centerY = window.innerHeight / 2 - rect.height / 2;

                    clone.style.top = `${centerY}px`;
                    clone.style.left = `${centerX}px`;
                    clone.classList.add('is-zoomed');
                });

                // Complete data navigation pipe routines
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1500);
            });
        });
    </script>
